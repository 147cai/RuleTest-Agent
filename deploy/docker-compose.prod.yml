# TestAgent 内网生产环境 Docker Compose
# 完全自包含：包含 postgres、redis、server、frontend、code-index-service
# 所有服务在独立网络中，不依赖外部网络
#
# 用法（在 TestAgent/ 目录下执行）：
#   docker compose -f deploy/docker-compose.prod.yml up -d
#
# 访问地址：
#   Frontend:   http://128.196.162.2:39999
#   Server API: http://128.196.162.2:39998
#   Code Index: http://128.196.162.2:40001

services:

  # ─── 基础设施 ───────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: testagent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mcp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcp_password}
      POSTGRES_DB: ${POSTGRES_DB:-testagent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mcp_user} -d ${POSTGRES_DB:-testagent}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - testagent-network

  redis:
    image: redis:7-alpine
    container_name: testagent-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - testagent-network

  # ─── 应用服务 ────────────────────────────────────────────────────────────────

  server:
    build:
      context: ..
      dockerfile: deploy/dockerfiles/server-Dockerfile.offline
    container_name: testagent-server
    restart: unless-stopped
    ports:
      - "39998:8000"
    environment:
      NODE_ENV: production
      PORT: 8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-mcp_user}:${POSTGRES_PASSWORD:-mcp_password}@postgres:5432/${POSTGRES_DB:-testagent}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      AGENT_SCRIPT_PATH: /app/agent/coordinator_main.py
      STORAGE_ROOT: /app/storage
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      LLM_PROVIDER: ${LLM_PROVIDER:-dashscope}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-qwen3-max}
      LLM_API_KEY: ${LLM_API_KEY}
      CODE_INDEX_SERVICE_URL: http://code-index-service:8080
      AGENT_OUTPUT_DIR: /app/agent-outputs
    volumes:
      - uploads_data:/app/uploads
      - agent_outputs:/app/agent-outputs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - testagent-network

  code-index-service:
    build:
      context: ..
      dockerfile: deploy/dockerfiles/code-index-Dockerfile.offline
    container_name: testagent-code-index
    restart: unless-stopped
    ports:
      - "40001:8080"
    environment:
      STORAGE_PATH: /data
    volumes:
      - code_index_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - testagent-network

  frontend:
    build:
      context: ..
      dockerfile: deploy/dockerfiles/frontend-Dockerfile.offline
    container_name: testagent-frontend
    restart: unless-stopped
    ports:
      - "39999:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - testagent-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  code_index_data:
    driver: local
  agent_outputs:
    driver: local

networks:
  testagent-network:
    driver: bridge
